<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Snip</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      cursor: default;
      user-select: none;
      background: transparent;
    }
    /* dim everything; the selection punches a clear hole via box-shadow */
    #dim {
      position: fixed; inset: 0;
      background: rgba(10, 11, 15, 0.35);
    }
    #sel {
      position: fixed;
      border: 1.5px solid #5b8cff;
      background: transparent;
      box-shadow: 0 0 0 100000px rgba(10, 11, 15, 0.35);
      display: none;
      pointer-events: none;
    }
    #hint {
      position: fixed;
      top: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(20, 23, 30, 0.9);
      color: #ececf1;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #2a2c36;
      pointer-events: none;
    }
    #size {
      position: fixed;
      font-family: -apple-system, "Segoe UI", monospace;
      font-size: 11px;
      color: #fff;
      background: #5b8cff;
      padding: 2px 6px;
      border-radius: 4px;
      display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="dim"></div>
  <div id="sel"></div>
  <div id="size"></div>
  <div id="hint">Drag to snip · Esc to cancel</div>
  <script src="overlay.js"></script>
</body>
</html>
